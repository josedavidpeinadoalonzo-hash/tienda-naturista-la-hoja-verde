<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="30%" style="stop-color:#f1f8e9"/>
      <stop offset="100%" style="stop-color:#fff8e1"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32"/>
      <stop offset="100%" style="stop-color:#4caf50"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b5e20"/>
      <stop offset="100%" style="stop-color:#388e3c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- Hojas decorativas -->
  <g opacity="0.12">
    <path d="M0,500 Q80,420 60,350 Q80,380 100,350 Q120,420 40,500 Z" fill="url(#leafGrad)" transform="translate(100,0) rotate(-15)"/>
    <path d="M0,500 Q80,420 60,350 Q80,380 100,350 Q120,420 40,500 Z" fill="url(#leafGrad2)" transform="translate(900,-50) rotate(25) scale(1.2)"/>
    <path d="M0,500 Q80,420 60,350 Q80,380 100,350 Q120,420 40,500 Z" fill="url(#leafGrad)" transform="translate(500,100) rotate(-5) scale(0.8)"/>
    <path d="M0,500 Q80,420 60,350 Q80,380 100,350 Q120,420 40,500 Z" fill="url(#leafGrad2)" transform="translate(700,-80) rotate(15) scale(0.9)"/>
    <circle cx="200" cy="150" r="80" fill="#4caf50"/>
    <circle cx="800" cy="100" r="60" fill="#66bb6a"/>
    <circle cx="400" cy="50" r="40" fill="#81c784"/>
    <circle cx="1000" cy="200" r="50" fill="#a5d6a7"/>
  </g>
  <!-- Botijas decorativas -->
  <g transform="translate(180,250)" opacity="0.15">
    <rect x="-30" y="-5" width="60" height="90" rx="8" fill="#2e7d32"/>
    <rect x="-35" y="-12" width="70" height="10" rx="3" fill="#1b5e20"/>
    <text x="0" y="30" text-anchor="middle" font-family="sans-serif" font-size="6" fill="white">NATURAL</text>
  </g>
  <g transform="translate(950,280)" opacity="0.15">
    <rect x="-25" y="-5" width="50" height="80" rx="8" fill="#388e3c"/>
    <rect x="-30" y="-12" width="60" height="10" rx="3" fill="#1b5e20"/>
    <text x="0" y="28" text-anchor="middle" font-family="sans-serif" font-size="5" fill="white">SALUD</text>
  </g>
  <!-- Líneas de fondo -->
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#e0e0e0" stroke-width="0.5" opacity="0.3"/>
</svg>
